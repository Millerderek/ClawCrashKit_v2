# ═══════════════════════════════════════════════════════════════════════════════
# ClaudeClaw — Unified Docker Compose
# Bot + Memory Stack (Qdrant + PostgreSQL + Redis)
#
# Usage:
#   docker compose up -d                                    Start everything
#   docker compose up -d claudeclaw                         Bot only
#   docker compose --profile memory up -d                   Bot + memory stack
#   docker compose --profile memory up -d qdrant postgres redis  Memory only
#   docker compose down                                     Stop all
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ─── ClaudeClaw Bot ───────────────────────────────────────────────────────
  claudeclaw:
    build: .
    container_name: claudeclaw
    restart: unless-stopped
    env_file: .env
    volumes:
      - ${CLAUDECLAW_WORKING_DIR:-~/projects}:/workspace:rw
      - ~/.claude:/root/.claude:ro

  # ─── Qdrant — Vector Store (semantic memory) ─────────────────────────────
  # Stores embeddings for conversational memories via cosine similarity
  # API: http://127.0.0.1:6333   Dashboard: http://127.0.0.1:6333/dashboard
  qdrant:
    image: qdrant/qdrant:latest
    container_name: openclaw-memory-qdrant-1
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    profiles: ["memory"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── PostgreSQL — Metadata Store ──────────────────────────────────────────
  # Keyscores, confidence, TTLs, entity tags, contradictions, feedback
  postgres:
    image: postgres:16-alpine
    container_name: openclaw-memory-postgres-1
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: openclaw_memory
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    secrets:
      - pg_password
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./memory/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    restart: unless-stopped
    profiles: ["memory"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclaw -d openclaw_memory"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Redis — Cache Layer ──────────────────────────────────────────────────
  # Entity indices, keyscore cache, pre-filter lookups
  redis:
    image: redis:7-alpine
    container_name: openclaw-memory-redis-1
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --appendonly yes
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --save 60 100
        --save 300 10
    restart: unless-stopped
    profiles: ["memory"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

secrets:
  pg_password:
    file: ./memory/secrets/pg_password.txt

volumes:
  qdrant_data:
    name: openclaw-memory_qdrant_data
  qdrant_snapshots:
    name: openclaw-memory_qdrant_snapshots
  pg_data:
    name: openclaw-memory_pg_data
  redis_data:
    name: openclaw-memory_redis_data
